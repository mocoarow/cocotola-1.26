---
desc: ゲストのアクセストークン発行とユーザー情報取得を確認する
runners:
  req: http://localhost:8000
vars:
  ORGANIZATION_NAME: ${ORGANIZATION_NAME}
steps:
  createToken:
    desc: ゲストのアクセストークンを発行する
    req:
      /api/v1/auth/guest/authenticate:
        post:
          body:
            application/json:
              organizationName: "{{ vars.ORGANIZATION_NAME }}"
    test: |
      current.res.status == 200
      && (current.res.body.accessToken startsWith "eyJ") == true
    bind:
      guestAccessToken: current.res.body.accessToken

  profile:
    desc: ゲストのユーザー情報を取得
    req:
      /api/v1/auth/me:
        get:
          headers:
            authorization: "Bearer {{ guestAccessToken }}"
    test: |
      current.res.status == 200
      && current.res.body.loginId == ("guest@@" + vars.ORGANIZATION_NAME)
      && current.res.body.organizationName == vars.ORGANIZATION_NAME
