---
StudyQuestionResponse:
  type: object
  required:
    - questionId
    - questionType
    - content
    - orderIndex
  properties:
    questionId:
      type: string
      pattern: ^.*$
    questionType:
      type: string
      pattern: ^.*$
    content:
      type: string
      pattern: ^.*$
    tags:
      type: array
      items:
        type: string
        pattern: ^.*$
        maxLength: 100
      maxItems: 20
    orderIndex:
      type: integer
      format: int32

GetStudyQuestionsResponse:
  type: object
  required:
    - questions
    - totalDue
    - newCount
    - reviewCount
  properties:
    questions:
      type: array
      maxItems: 100
      items:
        $ref: '#/StudyQuestionResponse'
    totalDue:
      type: integer
      format: int32
    newCount:
      type: integer
      format: int32
    reviewCount:
      type: integer
      format: int32

StudySummaryResponse:
  type: object
  description: |
    Counts of questions currently available for study in the given workbook.
    `reviewCount` is the number of questions whose study record's NextDueAt has
    elapsed (or every recorded question, in practice mode). `newCount` is the
    number of active questions without a study record. `reviewRatioNumerator`
    and `reviewRatioDenominator` express the server's review/new mix used when
    selecting study questions.
  required:
    - newCount
    - reviewCount
    - totalDue
    - reviewRatioNumerator
    - reviewRatioDenominator
  properties:
    newCount:
      type: integer
      format: int32
    reviewCount:
      type: integer
      format: int32
    totalDue:
      type: integer
      format: int32
    reviewRatioNumerator:
      type: integer
      format: int32
    reviewRatioDenominator:
      type: integer
      format: int32

RecordAnswerRequest:
  type: object
  description: |
    Exactly one of `correct` or `selectedChoiceIds` must be provided, matched to
    the question's type. `correct` is for `word_fill`; `selectedChoiceIds` is for
    `multiple_choice` and lets the server decide correctness.
  properties:
    correct:
      type: boolean
    selectedChoiceIds:
      type: array
      maxItems: 40
      items:
        type: string
        maxLength: 100
        pattern: ^[A-Za-z0-9_-]+$

RecordAnswerResponse:
  type: object
  required:
    - nextDueAt
    - consecutiveCorrect
    - totalCorrect
    - totalIncorrect
  properties:
    nextDueAt:
      type: string
      format: date-time
    consecutiveCorrect:
      type: integer
      format: int32
    totalCorrect:
      type: integer
      format: int32
    totalIncorrect:
      type: integer
      format: int32
