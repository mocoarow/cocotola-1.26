        schema:
          type: string
      - name: questionId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Successfully deleted
        headers: {}
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '404':
        description: Question not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '500':
