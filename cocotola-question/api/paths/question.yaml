---
question:
  post:
    summary: Add a question
    deprecated: false
    description: Add a new question to a workbook
    operationId: addQuestion
    tags:
      - question
    parameters:
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../schemas/question.yaml#/AddQuestionRequest'
          examples: {}
      required: true
    responses:
      '201':
        description: Successfully created
        content:
          application/json:
            schema:
              $ref: '../schemas/question.yaml#/QuestionResponse'
        headers: {}
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '404':
        description: Workbook not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
    security:
      - BearerAuth: []
      - CookieAuth: []
  get:
    summary: List questions
    deprecated: false
    description: List all questions in a workbook
    operationId: listQuestions
    tags:
      - question
    parameters:
      - name: workbookId
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    responses:
      '200':
        description: Successfully retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/question.yaml#/ListQuestionsResponse'
        headers: {}
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '404':
        description: Workbook not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
    security:
      - BearerAuth: []
      - CookieAuth: []

