        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
    security:
      - BearerAuth: []
      - CookieAuth: []

internal-workbook:
  post:
    summary: Create a workbook (internal)
    deprecated: false
    description: Internal service-to-service endpoint to create a workbook in the target space. Visibility is auto-determined from the SpaceType.
    operationId: internalCreateWorkbook
    tags:
      - internal
      - workbook
    parameters: []
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../schemas/workbook.yaml#/CreateWorkbookRequest'
      required: true
    responses:
      '201':
        description: Successfully created
        content:
          application/json:
            schema:
              $ref: '../schemas/workbook.yaml#/WorkbookResponse'
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - ApiKey: []
  get:
    summary: List workbooks (internal)
    deprecated: false
    description: Internal service-to-service endpoint to list workbooks in the target space. Uses the X-Organization-Id header to scope the lookup.
    operationId: internalListWorkbooks
    tags:
      - internal
      - workbook
    parameters:
      - name: spaceId
        in: query
        required: true
        schema:
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    responses:
      '200':
        description: Successfully retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/workbook.yaml#/ListWorkbooksResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - ApiKey: []

