        - CookieAuth: []
  /api/v1/workbook/shared/{refId}:
    delete:
      summary: Unshare a workbook
      deprecated: false
      description: Remove a shared workbook reference
      operationId: unshare
      tags:
        - sharing
      parameters:
        - name: refId
          in: path
          required: true
          schema:
            type: string
            pattern: ^.*$
      responses:
        '204':
          description: Successfully unshared
          headers: {}
