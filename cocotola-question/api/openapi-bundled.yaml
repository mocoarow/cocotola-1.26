      summary: List public workbooks
      deprecated: false
      description: List all publicly visible workbooks
      operationId: listPublic
      tags:
        - sharing
      parameters: []
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPublicResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
components:
  schemas:
    CreateWorkbookRequest:
      type: object
      properties:
        spaceId:
          type: string
          x-go-name: SpaceID
          pattern: ^.*$
          x-oapi-codegen-extra-tags:
            binding: required
        title:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=200
          maxLength: 200
          pattern: ^.*$
        description:
          type: string
          x-oapi-codegen-extra-tags:
            binding: max=1000
          maxLength: 1000
          pattern: ^.*$
        visibility:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=private public
          enum:
            - private
            - public
      required:
        - spaceId
        - title
        - visibility
    UpdateWorkbookRequest:
      type: object
      properties:
        title:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=200
          maxLength: 200
          pattern: ^.*$
        description:
          type: string
          x-oapi-codegen-extra-tags:
            binding: max=1000
          maxLength: 1000
          pattern: ^.*$
        visibility:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=private public
          enum:
            - private
            - public
      required:
        - title
        - visibility
    WorkbookResponse:
      type: object
      properties:
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        spaceId:
          type: string
          x-go-name: SpaceID
          pattern: ^.*$
        ownerId:
          type: string
          x-go-name: OwnerID
          pattern: ^.*$
        organizationId:
          type: string
          x-go-name: OrganizationID
          pattern: ^.*$
        title:
          type: string
          pattern: ^.*$
        description:
          type: string
          pattern: ^.*$
        visibility:
          type: string
          enum:
            - private
            - public
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - workbookId
        - spaceId
        - ownerId
        - organizationId
        - title
        - description
        - visibility
        - createdAt
        - updatedAt
    ListWorkbooksResponse:
      type: object
      properties:
        workbooks:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/WorkbookResponse'
      required:
        - workbooks
    AddQuestionRequest:
      type: object
      properties:
        questionType:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
        content:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=10000
          maxLength: 10000
          pattern: ^.*$
        orderIndex:
          type: integer
          format: int32
          x-oapi-codegen-extra-tags:
            binding: gte=0
      required:
        - questionType
        - content
        - orderIndex
    UpdateQuestionRequest:
      type: object
      properties:
        content:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=10000
          maxLength: 10000
          pattern: ^.*$
        orderIndex:
          type: integer
          format: int32
          x-oapi-codegen-extra-tags:
            binding: gte=0
      required:
        - content
        - orderIndex
    QuestionResponse:
      type: object
      properties:
        questionId:
          type: string
          x-go-name: QuestionID
          pattern: ^.*$
        questionType:
          type: string
          pattern: ^.*$
        content:
          type: string
          pattern: ^.*$
        orderIndex:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - questionId
        - questionType
        - content
        - orderIndex
        - createdAt
        - updatedAt
    ListQuestionsResponse:
      type: object
      properties:
        questions:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/QuestionResponse'
      required:
        - questions
    ShareWorkbookResponse:
      type: object
      properties:
        referenceId:
          type: string
          x-go-name: ReferenceID
          pattern: ^.*$
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        addedAt:
          type: string
          format: date-time
      required:
        - referenceId
        - workbookId
        - addedAt
    SharedItemResponse:
      type: object
      properties:
        referenceId:
          type: string
          x-go-name: ReferenceID
          pattern: ^.*$
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        addedAt:
          type: string
          format: date-time
      required:
        - referenceId
        - workbookId
        - addedAt
    ListSharedResponse:
      type: object
      properties:
        references:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/SharedItemResponse'
      required:
        - references
    PublicWorkbookResponse:
      type: object
      properties:
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        ownerId:
          type: string
          x-go-name: OwnerID
          pattern: ^.*$
        title:
          type: string
          pattern: ^.*$
        description:
          type: string
          pattern: ^.*$
        createdAt:
          type: string
          format: date-time
      required:
        - workbookId
        - ownerId
        - title
        - description
        - createdAt
    ListPublicResponse:
      type: object
      properties:
        workbooks:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/PublicWorkbookResponse'
      required:
        - workbooks
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
          pattern: ^.*$
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          pattern: ^.*$
        message:
          type: string
          pattern: ^.*$
      required:
        - code
        - message
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
