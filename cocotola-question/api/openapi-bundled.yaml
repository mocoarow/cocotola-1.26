components:
  schemas:
    CreateWorkbookRequest:
      type: object
      properties:
        spaceId:
          type: string
          x-go-name: SpaceID
          pattern: ^.*$
          x-oapi-codegen-extra-tags:
            binding: required
        title:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=200
          maxLength: 200
          pattern: ^.*$
        description:
          type: string
          x-oapi-codegen-extra-tags:
            binding: max=1000
          maxLength: 1000
          pattern: ^.*$
        visibility:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=private public
          enum:
            - private
            - public
        language:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,len=2
          pattern: ^[a-z]{2}$
      required:
        - spaceId
        - title
        - visibility
        - language
    UpdateWorkbookRequest:
      type: object
      properties:
        title:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=200
          maxLength: 200
          pattern: ^.*$
        description:
          type: string
          x-oapi-codegen-extra-tags:
            binding: max=1000
          maxLength: 1000
          pattern: ^.*$
        visibility:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=private public
          enum:
            - private
            - public
        language:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,len=2
          pattern: ^[a-z]{2}$
      required:
        - title
        - visibility
        - language
    WorkbookResponse:
      type: object
      properties:
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        spaceId:
          type: string
          x-go-name: SpaceID
          pattern: ^.*$
        ownerId:
          type: string
          x-go-name: OwnerID
          pattern: ^.*$
        organizationId:
          type: string
          x-go-name: OrganizationID
          pattern: ^.*$
        title:
          type: string
          pattern: ^.*$
        description:
          type: string
          pattern: ^.*$
        visibility:
          type: string
          enum:
            - private
            - public
        language:
          type: string
          pattern: ^[a-z]{2}$
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - workbookId
        - spaceId
        - ownerId
        - organizationId
        - title
        - description
        - visibility
        - language
        - createdAt
        - updatedAt
    ListWorkbooksResponse:
      type: object
      properties:
        workbooks:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/WorkbookResponse'
      required:
        - workbooks
    AddQuestionRequest:
      type: object
      properties:
        questionType:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
        content:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=10000
          maxLength: 10000
          pattern: ^.*$
        tags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: ^[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+$
          maxItems: 20
        orderIndex:
          type: integer
          format: int32
          x-oapi-codegen-extra-tags:
            binding: gte=0
      required:
        - questionType
        - content
        - orderIndex
    UpdateQuestionRequest:
      type: object
      properties:
        content:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=10000
          maxLength: 10000
          pattern: ^.*$
        tags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: ^[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+$
          maxItems: 20
        orderIndex:
          type: integer
          format: int32
          x-oapi-codegen-extra-tags:
            binding: gte=0
      required:
        - content
        - orderIndex
    QuestionResponse:
      type: object
      properties:
        questionId:
          type: string
          x-go-name: QuestionID
          pattern: ^.*$
        questionType:
          type: string
          pattern: ^.*$
        content:
          type: string
          pattern: ^.*$
        tags:
          type: array
          items:
            type: string
            maxLength: 100
            pattern: ^[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+$
          maxItems: 20
        orderIndex:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - questionId
        - questionType
        - content
        - orderIndex
        - createdAt
        - updatedAt
    ListQuestionsResponse:
      type: object
      properties:
        questions:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/QuestionResponse'
      required:
        - questions
    ShareWorkbookResponse:
      type: object
      properties:
        referenceId:
          type: string
          x-go-name: ReferenceID
          pattern: ^.*$
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        addedAt:
          type: string
          format: date-time
      required:
        - referenceId
        - workbookId
        - addedAt
    SharedItemResponse:
      type: object
      properties:
        referenceId:
          type: string
          x-go-name: ReferenceID
          pattern: ^.*$
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        addedAt:
          type: string
          format: date-time
      required:
        - referenceId
        - workbookId
        - addedAt
    ListSharedResponse:
      type: object
      properties:
        references:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/SharedItemResponse'
      required:
        - references
    PublicWorkbookResponse:
      type: object
      properties:
        workbookId:
          type: string
          x-go-name: WorkbookID
          pattern: ^.*$
        ownerId:
          type: string
          x-go-name: OwnerID
          pattern: ^.*$
        title:
          type: string
          pattern: ^.*$
        description:
          type: string
          pattern: ^.*$
        language:
          type: string
          pattern: ^[a-z]{2}$
        createdAt:
          type: string
          format: date-time
      required:
        - workbookId
        - ownerId
        - title
        - description
        - language
        - createdAt
    ListPublicResponse:
      type: object
      properties:
        workbooks:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/PublicWorkbookResponse'
      required:
        - workbooks
    StudyQuestionResponse:
      type: object
      required:
        - questionId
        - questionType
        - content
        - orderIndex
      properties:
        questionId:
          type: string
          pattern: ^.*$
        questionType:
          type: string
          pattern: ^.*$
        content:
          type: string
          pattern: ^.*$
        tags:
          type: array
          items:
            type: string
            pattern: ^.*$
            maxLength: 100
          maxItems: 20
        orderIndex:
          type: integer
          format: int32
    GetStudyQuestionsResponse:
      type: object
      required:
        - questions
        - totalDue
        - newCount
        - reviewCount
      properties:
        questions:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/StudyQuestionResponse'
        totalDue:
          type: integer
          format: int32
        newCount:
          type: integer
          format: int32
        reviewCount:
          type: integer
          format: int32
    RecordAnswerRequest:
      type: object
      description: |
        Exactly one of `correct` or `selectedChoiceIds` must be provided, matched to
        the question's type. `correct` is for `word_fill`; `selectedChoiceIds` is for
        `multiple_choice` and lets the server decide correctness.
      properties:
        correct:
          type: boolean
        selectedChoiceIds:
          type: array
          maxItems: 40
          items:
            type: string
            maxLength: 100
            pattern: ^[A-Za-z0-9_-]+$
    RecordAnswerResponse:
      type: object
      required:
        - nextDueAt
        - consecutiveCorrect
        - totalCorrect
        - totalIncorrect
      properties:
        nextDueAt:
          type: string
          format: date-time
        consecutiveCorrect:
          type: integer
          format: int32
        totalCorrect:
          type: integer
          format: int32
        totalIncorrect:
          type: integer
          format: int32
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
          pattern: ^.*$
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          pattern: ^.*$
        message:
          type: string
          pattern: ^.*$
      required:
        - code
        - message
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    ApiKey:
      type: apiKey
      in: header
      name: X-Service-Api-Key
