        - BearerAuth: []
        - CookieAuth: []
  /api/v1/workbook/{workbookId}/share:
    post:
      summary: Share a workbook
      deprecated: false
      description: Share a workbook by creating a reference to it
      operationId: shareWorkbook
      tags:
        - sharing
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: string
            pattern: ^.*$
      responses:
        '201':
          description: Successfully shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareWorkbookResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '404':
          description: Workbook not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '409':
          description: Workbook reference already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/workbook/shared:
    get:
      summary: List shared workbooks
      deprecated: false
      description: List workbook references shared with the authenticated user
      operationId: listShared
      tags:
        - sharing
      parameters: []
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
