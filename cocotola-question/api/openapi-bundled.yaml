  /api/v1/workbook/{workbookId}/study:
    get:
      summary: Get study questions
      deprecated: false
      description: Get questions due for study based on spaced repetition algorithm
      operationId: getStudyQuestions
      tags:
        - study
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: string
            pattern: ^.*$
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - name: practice
          in: query
          required: false
          description: |
            When `true`, ignores the per-question NextDueAt schedule and returns every active question. Callers using this mode must skip the record answer endpoint so SRS state stays untouched.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successfully retrieved study questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStudyQuestionsResponse'
          headers: {}
        '400':
