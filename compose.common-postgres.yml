---
# Shared PostgreSQL service configuration
services:
  local-postgres-base:
    image: postgres:17
    container_name: local-postgres
    environment:
      POSTGRES_USER: username
      # kics-scan ignore-line
      POSTGRES_PASSWORD: password
      POSTGRES_DB: local
      TZ: Etc/GMT
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    volumes:
      - ./init-postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d local"]
      interval: 5s
      timeout: 30s
      retries: 6
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_RAW
      - SETFCAP
      - SYS_CHROOT
