openapi: 3.0.1
info:
  title: cocotola-auth
  description: cocotola-auth
  version: '1.0'
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers: []
security:
  - BearerAuth: []
  - CookieAuth: []
tags:
  - name: auth
  - name: group
  - name: space
  - name: user
paths:
  /api/v1/auth/password/authenticate:
    post:
      summary: Password authentication
      deprecated: false
      description: Authenticate user with login ID and password
      operationId: passwordAuthentication
      tags:
        - auth
      parameters:
        - name: X-Token-Delivery
          in: header
          description: Token delivery method (json or cookie)
          required: false
          schema:
            type: string
            enum:
              - json
              - cookie
            default: json
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordAuthRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/guest/authenticate:
    post:
      summary: Guest authentication
      deprecated: false
      description: Authenticate as a guest user with organization name only
      operationId: guestAuthentication
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestAuthRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Guest user not found or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/logout:
    post:
      summary: User logout
      deprecated: false
      description: Clear the session cookie and revoke the session token
      operationId: logout
      tags:
        - auth
      parameters: []
      responses:
        '204':
          description: Successfully logged out
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      deprecated: false
      description: Use a refresh token to obtain a new access token
      operationId: refreshToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/revoke:
    post:
      summary: Revoke a token
      deprecated: false
      description: Revoke an access token (JWT) or refresh token (opaque). Revoking a refresh token also revokes all associated access tokens.
      operationId: revokeToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
            examples: {}
        required: true
      responses:
        '204':
          description: Successfully revoked
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/me:
    get:
      summary: Get current user
      deprecated: false
      description: Get the authenticated user's information
      operationId: getMe
      tags:
        - auth
      parameters: []
      responses:
        '200':
          description: Successfully retrieved user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/group:
    post:
      summary: Create a group
      deprecated: false
      description: Create a new group within the operator's organization
      operationId: createGroup
      tags:
        - group
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGroupResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '409':
          description: Group name already exists or active group limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/space:
    post:
      summary: Create a space
      deprecated: false
      description: Create a new space within the operator's organization
      operationId: createSpace
      tags:
        - space
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSpaceResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
    get:
      summary: List spaces
      deprecated: false
      description: List spaces accessible by the authenticated user
      operationId: listSpaces
      tags:
        - space
      parameters: []
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSpacesResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/user:
    post:
      summary: Create a user
      deprecated: false
      description: Create a new user within the operator's organization
      operationId: createUser
      tags:
        - user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '409':
          description: User already exists or active user limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
components:
  schemas:
    PasswordAuthRequest:
      type: object
      properties:
        loginId:
          type: string
          x-go-name: LoginID
          x-oapi-codegen-extra-tags:
            binding: required,max=100
          pattern: ^.*$
          maxLength: 100
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,min=8,max=20
          minLength: 8
          maxLength: 20
          pattern: ^.*$
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - loginId
        - password
        - organizationName
    GuestAuthRequest:
      type: object
      properties:
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - organizationName
    AuthenticateResponse:
      type: object
      description: Authentication response. When X-Token-Delivery is 'json' (default), accessToken and refreshToken are returned in the body. When 'cookie', the session token is delivered via Set-Cookie header and tokens are omitted.
      properties:
        accessToken:
          type: string
          pattern: ^.*$
          description: JWT access token (omitted when delivered via cookie)
        refreshToken:
          type: string
          pattern: ^.*$
          description: Opaque refresh token (omitted when delivered via cookie)
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - refreshToken
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: New JWT access token
          pattern: ^.*$
      required:
        - accessToken
    RevokeRequest:
      type: object
      properties:
        token:
          type: string
          description: The token to revoke (JWT access token or opaque refresh token)
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - token
    GetMeResponse:
      type: object
      properties:
        userId:
          type: integer
          x-go-name: UserID
          format: int32
        loginId:
          type: string
          x-go-name: LoginID
          pattern: ^.*$
        organizationName:
          type: string
          pattern: ^.*$
      required:
        - userId
        - loginId
        - organizationName
    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=255
          maxLength: 255
          pattern: ^.*$
      required:
        - name
    CreateGroupResponse:
      type: object
      properties:
        groupId:
          type: integer
          x-go-name: GroupID
          format: int32
        organizationId:
          type: integer
          x-go-name: OrganizationID
          format: int32
        name:
          type: string
          pattern: ^.*$
        enabled:
          type: boolean
      required:
        - groupId
        - organizationId
        - name
        - enabled
    CreateSpaceRequest:
      type: object
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=100
          maxLength: 100
          pattern: ^.*$
        spaceType:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=public private
          enum:
            - public
            - private
      required:
        - name
        - spaceType
    CreateSpaceResponse:
      type: object
      properties:
        spaceId:
          type: integer
          x-go-name: SpaceID
          format: int32
        organizationId:
          type: integer
          x-go-name: OrganizationID
          format: int32
        ownerId:
          type: integer
          x-go-name: OwnerID
          format: int32
        keyName:
          type: string
          pattern: ^.*$
        name:
          type: string
          pattern: ^.*$
        spaceType:
          type: string
          enum:
            - public
            - private
        deleted:
          type: boolean
      required:
        - spaceId
        - organizationId
        - ownerId
        - keyName
        - name
        - spaceType
        - deleted
    SpaceItem:
      type: object
      properties:
        spaceId:
          type: integer
          x-go-name: SpaceID
          format: int32
        organizationId:
          type: integer
          x-go-name: OrganizationID
          format: int32
        ownerId:
          type: integer
          x-go-name: OwnerID
          format: int32
        keyName:
          type: string
          pattern: ^.*$
        name:
          type: string
          pattern: ^.*$
        spaceType:
          type: string
          enum:
            - public
            - private
        deleted:
          type: boolean
      required:
        - spaceId
        - organizationId
        - ownerId
        - keyName
        - name
        - spaceType
        - deleted
    ListSpacesResponse:
      type: object
      properties:
        spaces:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/SpaceItem'
      required:
        - spaces
    CreateUserRequest:
      type: object
      properties:
        loginId:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=255
          maxLength: 255
          pattern: ^.*$
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,min=8
          minLength: 8
          pattern: ^.*$
      required:
        - loginId
        - password
    CreateUserResponse:
      type: object
      properties:
        appUserId:
          type: integer
          x-go-name: AppUserID
          format: int32
        organizationId:
          type: integer
          x-go-name: OrganizationID
          format: int32
        loginId:
          type: string
          x-go-name: LoginID
          pattern: ^.*$
        enabled:
          type: boolean
      required:
        - appUserId
        - organizationId
        - loginId
        - enabled
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          pattern: ^.*$
        message:
          type: string
          pattern: ^.*$
      required:
        - code
        - message
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
