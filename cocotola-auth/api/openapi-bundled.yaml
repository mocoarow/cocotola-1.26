openapi: 3.0.1
info:
  title: cocotola-auth
  description: cocotola-auth
  version: '1.0'
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers: []
security:
  - BearerAuth: []
  - CookieAuth: []
tags:
  - name: auth
  - name: authz
  - name: internal
  - name: group
  - name: health
  - name: organization
  - name: space
  - name: user
paths:
  /api/v1/auth/health:
    get:
      summary: Health check
      deprecated: false
      description: Check the health of the service by verifying database connectivity with SELECT 1
      operationId: healthCheck
      tags:
        - health
      parameters: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
          headers: {}
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/password/authenticate:
    post:
      summary: Password authentication
      deprecated: false
      description: Authenticate user with login ID and password
      operationId: passwordAuthentication
      tags:
        - auth
      parameters:
        - name: X-Token-Delivery
          in: header
          description: Token delivery method (json or cookie)
          required: false
          schema:
            type: string
            enum:
              - json
              - cookie
            default: json
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordAuthRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/guest/authenticate:
    post:
      summary: Guest authentication
      deprecated: false
      description: Authenticate as a guest user with organization name only
      operationId: guestAuthentication
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestAuthRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Guest user not found or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/logout:
    post:
      summary: User logout
      deprecated: false
      description: Clear the session cookie and revoke the session token
      operationId: logout
      tags:
        - auth
      parameters: []
      responses:
        '204':
          description: Successfully logged out
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      deprecated: false
      description: Use a refresh token to obtain a new access token
      operationId: refreshToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
  /api/v1/auth/revoke:
    post:
      summary: Revoke a token
      deprecated: false
      description: Revoke an access token (JWT) or refresh token (opaque). Revoking a refresh token also revokes all associated access tokens.
      operationId: revokeToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
            examples: {}
        required: true
      responses:
        '204':
          description: Successfully revoked
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/internal/auth/supabase/exchange:
    post:
      summary: Exchange Supabase JWT for internal tokens
      deprecated: false
      description: Verify a Supabase JWT and return internal access and refresh tokens. Creates an AppUser if one does not exist for the Supabase user.
      operationId: supabaseExchange
      tags:
        - internal
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupabaseExchangeRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully exchanged token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid Supabase JWT or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - ServiceApiKey: []
  /api/v1/auth/me:
    get:
      summary: Get current user
      deprecated: false
      description: Get the authenticated user's information
      operationId: getMe
      tags:
        - auth
      parameters: []
      responses:
        '200':
          description: Successfully retrieved user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/group:
    post:
      summary: Create a group
      deprecated: false
      description: Create a new group within the operator's organization
      operationId: createGroup
      tags:
        - group
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGroupResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '409':
          description: Group name already exists or active group limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/space:
    post:
      summary: Create a space
      deprecated: false
      description: Create a new space within the operator's organization
      operationId: createSpace
      tags:
        - space
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSpaceResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
    get:
      summary: List spaces
      deprecated: false
      description: List spaces accessible by the authenticated user
      operationId: listSpaces
      tags:
        - space
      parameters: []
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSpacesResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/user:
    post:
      summary: Create a user
      deprecated: false
      description: Create a new user within the operator's organization
      operationId: createUser
      tags:
        - user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '409':
          description: User already exists or active user limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/organization:
    get:
      summary: Find an organization by name
      deprecated: false
      description: Look up an organization by its name and return its ID
      operationId: findOrganization
      tags:
        - organization
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            pattern: ^.*$
          description: Organization name to look up
      responses:
        '200':
          description: Organization found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindOrganizationResponse'
          headers: {}
        '400':
          description: Missing name parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/authz/check:
    get:
      summary: Check authorization
      deprecated: false
      description: Check if a user is allowed to perform an action on a resource within an organization
      operationId: checkAuthorization
      tags:
        - authz
      parameters:
        - name: org
          in: query
          required: true
          schema:
            type: integer
          description: Organization ID
        - name: user
          in: query
          required: true
          schema:
            type: integer
          description: User ID
        - name: action
          in: query
          required: true
          schema:
            type: string
            pattern: ^.*$
          description: Action to check (e.g. create_workbook, view_workbook)
        - name: resource
          in: query
          required: true
          schema:
            type: string
            pattern: ^.*$
          description: Resource to check (e.g. *, workbook:123)
      responses:
        '200':
          description: Authorization check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzCheckResponse'
          headers: {}
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security: []
components:
  schemas:
    PasswordAuthRequest:
      type: object
      properties:
        loginId:
          type: string
          x-go-name: LoginID
          x-oapi-codegen-extra-tags:
            binding: required,max=100
          pattern: ^.*$
          maxLength: 100
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,min=8,max=20
          minLength: 8
          maxLength: 20
          pattern: ^.*$
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - loginId
        - password
        - organizationName
    GuestAuthRequest:
      type: object
      properties:
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - organizationName
    AuthenticateResponse:
      type: object
      description: Authentication response. When X-Token-Delivery is 'json' (default), accessToken and refreshToken are returned in the body. When 'cookie', the session token is delivered via Set-Cookie header and tokens are omitted.
      properties:
        accessToken:
          type: string
          pattern: ^.*$
          description: JWT access token (omitted when delivered via cookie)
        refreshToken:
          type: string
          pattern: ^.*$
          description: Opaque refresh token (omitted when delivered via cookie)
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - refreshToken
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: New JWT access token
          pattern: ^.*$
      required:
        - accessToken
    RevokeRequest:
      type: object
      properties:
        token:
          type: string
          description: The token to revoke (JWT access token or opaque refresh token)
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - token
    SupabaseExchangeRequest:
      type: object
      properties:
        supabaseJwt:
          type: string
          x-go-name: SupabaseJWT
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - supabaseJwt
        - organizationName
    GetMeResponse:
      type: object
      properties:
        userId:
          type: string
          x-go-name: UserID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        loginId:
          type: string
          x-go-name: LoginID
          pattern: ^.*$
        organizationName:
          type: string
          pattern: ^.*$
      required:
        - userId
        - loginId
        - organizationName
    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=255
          maxLength: 255
          pattern: ^.*$
      required:
        - name
    CreateGroupResponse:
      type: object
      properties:
        groupId:
          type: string
          x-go-name: GroupID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        organizationId:
          type: string
          x-go-name: OrganizationID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        name:
          type: string
          pattern: ^.*$
        enabled:
          type: boolean
      required:
        - groupId
        - organizationId
        - name
        - enabled
    CreateSpaceRequest:
      type: object
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=100
          maxLength: 100
          pattern: ^.*$
        spaceType:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,oneof=public private
          enum:
            - public
            - private
      required:
        - name
        - spaceType
    CreateSpaceResponse:
      type: object
      properties:
        spaceId:
          type: string
          x-go-name: SpaceID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        organizationId:
          type: string
          x-go-name: OrganizationID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        ownerId:
          type: string
          x-go-name: OwnerID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        keyName:
          type: string
          pattern: ^.*$
        name:
          type: string
          pattern: ^.*$
        spaceType:
          type: string
          enum:
            - public
            - private
        deleted:
          type: boolean
      required:
        - spaceId
        - organizationId
        - ownerId
        - keyName
        - name
        - spaceType
        - deleted
    SpaceItem:
      type: object
      properties:
        spaceId:
          type: string
          x-go-name: SpaceID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        organizationId:
          type: string
          x-go-name: OrganizationID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        ownerId:
          type: string
          x-go-name: OwnerID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        keyName:
          type: string
          pattern: ^.*$
        name:
          type: string
          pattern: ^.*$
        spaceType:
          type: string
          enum:
            - public
            - private
        deleted:
          type: boolean
      required:
        - spaceId
        - organizationId
        - ownerId
        - keyName
        - name
        - spaceType
        - deleted
    ListSpacesResponse:
      type: object
      properties:
        spaces:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/SpaceItem'
      required:
        - spaces
    CreateUserRequest:
      type: object
      properties:
        loginId:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=255
          maxLength: 255
          pattern: ^.*$
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,min=8
          minLength: 8
          pattern: ^.*$
      required:
        - loginId
        - password
    CreateUserResponse:
      type: object
      properties:
        appUserId:
          type: string
          x-go-name: AppUserID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        organizationId:
          type: string
          x-go-name: OrganizationID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        loginId:
          type: string
          x-go-name: LoginID
          pattern: ^.*$
        enabled:
          type: boolean
      required:
        - appUserId
        - organizationId
        - loginId
        - enabled
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
          pattern: ^.*$
      required:
        - status
    FindOrganizationResponse:
      type: object
      properties:
        id:
          type: string
          x-go-name: ID
          format: uuid
          pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
        name:
          type: string
          pattern: ^.*$
      required:
        - id
        - name
    AuthzCheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
      required:
        - allowed
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          pattern: ^.*$
        message:
          type: string
          pattern: ^.*$
      required:
        - code
        - message
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    ServiceApiKey:
      type: apiKey
      in: header
      name: X-Service-Api-Key
