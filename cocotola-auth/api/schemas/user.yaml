---
CreateUserRequest:
  type: object
  properties:
    loginId:
      type: string
      x-oapi-codegen-extra-tags:
        binding: required,max=255
      maxLength: 255
      pattern: ^.*$
    password:
      type: string
      x-oapi-codegen-extra-tags:
        binding: required,min=8
      minLength: 8
      pattern: ^.*$
  required:
    - loginId
    - password

CreateUserResponse:
  type: object
  properties:
    appUserId:
      type: string
      x-go-name: AppUserID
      format: uuid
    organizationId:
      type: string
      x-go-name: OrganizationID
      format: uuid
    loginId:
      type: string
      x-go-name: LoginID
      pattern: ^.*$
    enabled:
      type: boolean
  required:
    - appUserId
    - organizationId
    - loginId
    - enabled
