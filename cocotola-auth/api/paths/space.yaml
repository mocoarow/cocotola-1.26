---
space:
  post:
    summary: Create a space
    deprecated: false
    description: Create a new space within the operator's organization
    operationId: createSpace
    tags:
      - space
    parameters: []
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../schemas/space.yaml#/CreateSpaceRequest'
          examples: {}
      required: true
    responses:
      '201':
        description: Successfully created
        content:
          application/json:
            schema:
              $ref: '../schemas/space.yaml#/CreateSpaceResponse'
        headers: {}
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
    security:
      - BearerAuth: []
      - CookieAuth: []
  get:
    summary: List spaces
    deprecated: false
    description: List spaces accessible by the authenticated user
    operationId: listSpaces
    tags:
      - space
    parameters: []
    responses:
      '200':
        description: Successfully retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/space.yaml#/ListSpacesResponse'
        headers: {}
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
        headers: {}
    security:
      - BearerAuth: []
      - CookieAuth: []
