---
openapi: 3.0.1
info:
  title: cocotola-auth
  description: cocotola-auth
  version: '1.0'
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: auth
paths:
  /api/v1/auth/password/authenticate:
    post:
      summary: Password authentication
      deprecated: false
      description: Authenticate user with login ID and password
      operationId: passwordAuthentication
      tags:
        - auth
      parameters:
        - name: X-Token-Delivery
          in: header
          description: Token delivery method (json or cookie)
          required: false
          schema:
            type: string
            enum: [json, cookie]
            default: json
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordAuthRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
  /api/v1/auth/logout:
    post:
      summary: User logout
      deprecated: false
      description: Clear the session cookie and revoke the session token
      operationId: logout
      tags:
        - auth
      parameters: []
      responses:
        '204':
          description: Successfully logged out
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      deprecated: false
      description: Use a refresh token to obtain a new access token
      operationId: refreshToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples: {}
        required: true
      responses:
        '200':
          description: Successfully refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
  /api/v1/auth/revoke:
    post:
      summary: Revoke a token
      deprecated: false
      description: Revoke an access token (JWT) or refresh token (opaque). Revoking a refresh token also revokes all associated access tokens.
      operationId: revokeToken
      tags:
        - auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRequest'
            examples: {}
        required: true
      responses:
        '204':
          description: Successfully revoked
          headers: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
  /api/v1/auth/me:
    get:
      summary: Get current user
      deprecated: false
      description: Get the authenticated user's information
      operationId: getMe
      tags:
        - auth
      parameters: []
      responses:
        '200':
          description: Successfully retrieved user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          headers: {}
      security:
        - BearerAuth: []
        - CookieAuth: []
components:
  schemas:
    PasswordAuthRequest:
      type: object
      properties:
        loginId:
          type: string
          x-go-name: LoginID
          x-oapi-codegen-extra-tags:
            binding: required,max=100
          pattern: ^.*$
          maxLength: 100
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,min=8,max=20
          minLength: 8
          maxLength: 20
          pattern: ^.*$
        organizationName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required,max=20
          maxLength: 20
          pattern: ^.*$
      required:
        - loginId
        - password
        - organizationName
    AuthenticateResponse:
      type: object
      description: >-
        Authentication response. When X-Token-Delivery is 'json' (default),
        accessToken and refreshToken are returned in the body. When 'cookie',
        the session token is delivered via Set-Cookie header and tokens are omitted.
      properties:
        accessToken:
          type: string
          pattern: ^.*$
          description: JWT access token (omitted when delivered via cookie)
        refreshToken:
          type: string
          pattern: ^.*$
          description: Opaque refresh token (omitted when delivered via cookie)
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - refreshToken
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: New JWT access token
          pattern: ^.*$
      required:
        - accessToken
    RevokeRequest:
      type: object
      properties:
        token:
          type: string
          description: The token to revoke (JWT access token or opaque refresh token)
          x-oapi-codegen-extra-tags:
            binding: required
          pattern: ^.*$
      required:
        - token
    GetMeResponse:
      type: object
      properties:
        userId:
          type: integer
          x-go-name: UserID
          format: int32
        loginId:
          type: string
          x-go-name: LoginID
          pattern: ^.*$
        organizationName:
          type: string
          pattern: ^.*$
      required:
        - userId
        - loginId
        - organizationName
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          pattern: ^.*$
        message:
          type: string
          pattern: ^.*$
      required:
        - code
        - message
  responses: {}
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
servers: []
