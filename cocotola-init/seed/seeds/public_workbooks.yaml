---
# Public workbook seeds.
#
# Idempotency: workbook identity is the seedKey, embedded in the workbook
# description as `[seedKey:<value>]`. Question identity is the per-workbook
# seedKey, embedded as a tag `seed-<workbookSeedKey>:<questionSeedKey>`.
# Renaming a Title or Description is safe (the workbook is matched by
# seedKey, not by Title). Renaming a seedKey creates a new entity.
#
# Content schema by questionType (see cocotola-question/domain/question/content.go):
#   word_fill:
#     {
#       "source": {"text": "...", "lang": "ja|en|..."},
#       "target": {"text": "... {{blank}} ...", "lang": "ja|en|..."},
#       "explanation": "optional, no HTML",
#       "allowPartialCredit": bool
#     }
#     - source.lang must differ from target.lang.
#     - target.text must contain at least one {{blank}}.
#   multiple_choice:
#     {
#       "questionText": "...",
#       "explanation": "optional, no HTML",
#       "choices": [{"id": "c1", "text": "...", "isCorrect": bool}, ...],
#       "displayCount": 1..20,
#       "showCorrectCount": bool,
#       "shuffleChoices": bool,
#       "allowPartialCredit": bool
#     }
#     - 1..40 choices; at least one isCorrect.
#     - displayCount must be in [1,20], <= len(choices), >= number of correct.
workbooks:
  # ---------- Workbook 1: 穴埋め問題 10問 ----------
  - seedKey: fillblank-en-jp-v1
    title: "穴埋め問題: 日常英会話 10問"
    description: "日本語の意味から英文の空欄を埋める穴埋め問題集です。日常生活で使う基本表現を10問収録しています。"
    questions:
      - seedKey: q01
        questionType: word_fill
        content: '{"source":{"text":"りんごを食べる","lang":"ja"},"target":{"text":"eat an {{apple}}","lang":"en"},"explanation":"apple は「りんご」を意味する基本単語です。母音から始まるので冠詞は a ではなく an を使います。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:food
          - lang:en-ja
        orderIndex: 1
      - seedKey: q02
        questionType: word_fill
        content: '{"source":{"text":"犬が走る","lang":"ja"},"target":{"text":"A {{dog}} runs","lang":"en"},"explanation":"dog は「犬」を意味します。三人称単数現在では動詞に s を付けて runs となります。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:animals
          - lang:en-ja
        orderIndex: 2
      - seedKey: q03
        questionType: word_fill
        content: '{"source":{"text":"私は本を読む","lang":"ja"},"target":{"text":"I read a {{book}}","lang":"en"},"explanation":"book は「本」を意味します。read は「読む」の動詞です。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:vocabulary
          - lang:en-ja
        orderIndex: 3
      - seedKey: q04
        questionType: word_fill
        content: '{"source":{"text":"水を飲む","lang":"ja"},"target":{"text":"drink {{water}}","lang":"en"},"explanation":"water は「水」を意味する不可算名詞です。冠詞は付けません。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:food
          - lang:en-ja
        orderIndex: 4
      - seedKey: q05
        questionType: word_fill
        content: '{"source":{"text":"学校に行く","lang":"ja"},"target":{"text":"go to {{school}}","lang":"en"},"explanation":"school は「学校」です。go to school のように冠詞を付けない慣用表現です。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:daily-life
          - lang:en-ja
        orderIndex: 5
      - seedKey: q06
        questionType: word_fill
        content: '{"source":{"text":"友達と遊ぶ","lang":"ja"},"target":{"text":"play with {{friends}}","lang":"en"},"explanation":"friend は「友達」、複数形は friends です。play with someone で「誰かと遊ぶ」となります。","allowPartialCredit":true}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:daily-life
          - lang:en-ja
        orderIndex: 6
      - seedKey: q07
        questionType: word_fill
        content: '{"source":{"text":"私は嬉しい","lang":"ja"},"target":{"text":"I am {{happy}}","lang":"en"},"explanation":"happy は「嬉しい・幸せな」を意味する形容詞です。be 動詞と一緒に使います。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:emotions
          - lang:en-ja
        orderIndex: 7
      - seedKey: q08
        questionType: word_fill
        content: '{"source":{"text":"彼は先生です","lang":"ja"},"target":{"text":"He is a {{teacher}}","lang":"en"},"explanation":"teacher は「先生・教師」を意味する名詞です。職業を表す名詞には冠詞 a を付けます。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:occupation
          - lang:en-ja
        orderIndex: 8
      - seedKey: q09
        questionType: word_fill
        content: '{"source":{"text":"高い山","lang":"ja"},"target":{"text":"a high {{mountain}}","lang":"en"},"explanation":"mountain は「山」、high は「高い」を意味します。形容詞は名詞の前に置きます。","allowPartialCredit":false}'
        tags:
          - type:wordfill
          - level:beginner
          - topic:nature
          - lang:en-ja
        orderIndex: 9
      - seedKey: q10
        questionType: word_fill
