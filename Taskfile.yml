---
version: "3"

dotenv: ['.env']

vars:
  GO_PROJECTS:
    - hello-world
    - third-party-library
    - cocotola-lib
    - cocotola-auth
    - cocotola-question
    - cocotola-empty
  GO_APPS:
    - cocotola-auth
    - cocotola-empty
    - cocotola-question

tasks:
  init:
    cmds:
      - go work init
      - go work use -r .

  aqua-policy-allow:
    desc: "Allow aqua local registry policy"
    cmds:
      - aqua policy allow .aqua-policy.yaml

  gazelle:
    cmds:
      - bazelisk run //:gazelle -- -build_tags=small,medium,large

  mod-tidy:
    cmds:
      - bazelisk run @rules_go//go -- mod tidy

  lint-go-project:
    cmds:
      - |
        cd {{ .GO_PROJECT }}
        golangci-lint run --config ../.golangci.yml --timeout=5m
    requires:
      vars: [GO_PROJECT]

  lint:
    cmds:
      - for:
          var: GO_PROJECTS
        task: lint-go-project
        vars:
          GO_PROJECT: "{{ .ITEM }}"

  kics:
    cmds:
      - docker run --rm -t -v ./:/path checkmarx/kics:v2.1.19 scan -p /path --config /path/.kics.yml

  yamllint:
    cmds:
      - yamllint -c .yamllint.yml .

  misspell:
    cmds:
      - |
        find . -type f \
          -not -path '*/node_modules/*' \
          -not -path '*/.git/*' \
          -not -path '*/build/*' \
          -not -path '*/.react-router/*' \
          -not -name 'pnpm-lock.yaml' \
          | xargs misspell -locale US -i "$(paste -sd, .misspell-ignore)" -error

  markdownlint:
    cmds:
      - markdownlint --config .markdownlint.yaml .

  trivy:
    cmds:
      - docker run --rm -v .:/workspace aquasec/trivy:0.69.0 fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 /workspace

  gitleaks:
    cmds:
      - docker run --rm -v .:/workspace zricethezav/gitleaks:latest detect -c /workspace/.gitleaks.toml --source /workspace --no-banner

  lint-web:
    desc: "Run Biome lint and format check for cocotola-web"
    dir: cocotola-web
    cmds:
      - pnpm run check:biome

  check:
    cmds:
      - task: lint
      - task: lint-web
      - task: kics
      - task: yamllint
      - task: misspell
      - task: markdownlint
      - task: gitleaks
      - task: trivy

  generate-openapi-auth:
    desc: "Bundle OpenAPI spec and generate Go types for cocotola-auth"
    dir: cocotola-auth/api
    cmds:
      - pnpm redocly bundle openapi.yaml -o openapi-bundled.yaml
      - oapi-codegen --config oapi-codegen.yaml openapi-bundled.yaml

  generate-openapi-question:
    desc: "Bundle OpenAPI spec and generate Go types for cocotola-question"
    dir: cocotola-question/api
    cmds:
      - pnpm redocly bundle openapi.yaml -o openapi-bundled.yaml
      - oapi-codegen --config oapi-codegen.yaml openapi-bundled.yaml

  generate-openapi:
    desc: "Bundle OpenAPI spec and generate Go types for all services"
    cmds:
      - task: generate-openapi-auth
      - task: generate-openapi-question

  generate-go-project:
    cmds:
      - |
        cd {{ .GO_PROJECT }}
        if [ -f .mockery.yaml ]; then
          mockery
        fi
    requires:
      vars: [GO_PROJECT]

  generate:
    desc: "Generate code (OpenAPI types, mocks) for all Go projects"
    cmds:
      - task: generate-openapi
      - for:
          var: GO_PROJECTS
        task: generate-go-project
        vars:
          GO_PROJECT: "{{ .ITEM }}"

  push-project:
    cmds:
      - bazelisk run //{{ .PROJECT }}:push -- --tag {{ .TAG }}
    requires:
      vars: [PROJECT, TAG]

  push:
    cmds:
      - for:
          var: GO_APPS
        task: push-project
        vars:
          PROJECT: "{{ .ITEM }}"
    requires:
      vars: [TAG]

  build-go-project:
    cmds:
      - bazelisk run //{{ .PROJECT }}:load
    requires:
      vars: [PROJECT]

  build:
    cmds:
      - for:
          var: GO_APPS
        task: build-go-project
        vars:
          PROJECT: "{{ .ITEM }}"

  test:
    cmds:
      - docker compose -f compose.test.yml up -d --wait
      - rm -f ./coverage.lcov
      - bazelisk test //... --collect_code_coverage=true --test_output=errors --test_timeout=60 --test_size_filters=small,medium --cache_test_results=no
      - bazelisk coverage //... --combined_report=lcov --test_size_filters=small,medium
      - |
        OUTPUT_PATH=$(bazelisk info output_path)
        cp "${OUTPUT_PATH}/_coverage/_coverage_report.dat" ./coverage.lcov

  test-remote:
    cmds:
      - rm -f ./coverage.lcov
      - bazelisk test --config=remote //... --collect_code_coverage=true --test_output=errors --test_timeout=60 --test_size_filters=small,medium
      - bazelisk coverage --config=remote //... --combined_report=lcov --test_size_filters=small,medium
      - |
        OUTPUT_PATH=$(bazelisk info output_path)
        cp "${OUTPUT_PATH}/_coverage/_coverage_report.dat" ./coverage.lcov

  test-clear:
    cmds:
      - docker compose -f compose.test.yml down -v --remove-orphans

  update-mod-go-project:
    cmds:
      - |
        cd {{ .GO_PROJECT }}
        GOPROXY=direct go get -u ./...
        go mod tidy
    requires:
      vars: [GO_PROJECT]

  update-mod:
    cmds:
      - for:
          var: GO_PROJECTS
        task: update-mod-go-project
        vars:
          GO_PROJECT: "{{ .ITEM }}"

  supabase-init:
    desc: "Initialize Supabase project (run once)"
    cmds:
      - supabase init

  supabase-copy:
    desc: "Copy migration files from init-postgres to supabase/migrations"
    cmds:
      - mkdir -p supabase/migrations
      - |
        for f in init-postgres/*.up.sql; do
          cp "$f" "supabase/migrations/$(basename "$f")"
        done

  supabase-push:
    desc: "Push migrations to linked Supabase project"
    cmds:
      - supabase db push

  supabase-reset:
    desc: "Reset linked Supabase database and re-apply all migrations"
    cmds:
      - supabase db reset --linked

  run-hello-world:
    cmds:
      - bazelisk run //hello-world:hello-world
  run-hello-world-remote:
    cmds:
      - bazelisk run --config=remote //hello-world:hello-world

  run-cocotola-auth:
    desc: "Run cocotola-auth with local infrastructure"
    cmds:
      - docker compose -f compose.local.postgres-lgtm.yml up -d --wait
      - bazelisk run //cocotola-auth:cocotola-auth

  run-cocotola-auth-production:
    desc: "Run cocotola-auth with production infrastructure"
    dotenv: ['.env.production']
    cmds:
      - bazelisk run //cocotola-auth:cocotola-auth

  run-cocotola-question:
    desc: "Run cocotola-question with local infrastructure"
    cmds:
      - docker compose -f compose.local.postgres-firestore-jaeger.yml up -d --wait
      - bazelisk run //cocotola-question:cocotola-question

  run-cocotola-question-production:
    desc: "Run cocotola-question with production infrastructure"
    dotenv: ['.env.production']
    cmds:
      - bazelisk run //cocotola-question:cocotola-question

  run-cocotola-app:
    desc: "Run cocotola-app with local infrastructure (auth + question)"
    cmds:
      - docker compose -f compose.local.postgres-firestore-jaeger.yml up -d --wait
      - bazelisk run //cocotola-app:cocotola-app

  run-cocotola-empty:
    desc: "Run cocotola-empty with local infrastructure"
    cmds:
      - bazelisk run //cocotola-empty:cocotola-empty

  clear-local-infra:
    cmds:
      - docker compose -f compose.test.yml down -v --remove-orphans
